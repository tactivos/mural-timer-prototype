<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mural Timer — Prototype</title>
  <style>
:root {
  --red: #d6403a;
  --red-bright: #e34a44;
  --ink: #1c1c1e;
  --ink-soft: #3a3a3c;
  --muted: #8a8a8e;
  --muted-2: #b5b5ba;
  --line: #d7d7db;
  --panel-shadow: 0 10px 40px rgba(0,0,0,.16);
  --radius: 16px;
  --seg-bg: #eef0f2;
  --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: var(--font);
  color: var(--ink);
  background: #f7f7f5;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ===== Canvas backdrop ===== */
.canvas {
  position: fixed; inset: 0;
  background-color: #f7f7f5;
  background-image: radial-gradient(circle, #d2d2d4 1.3px, transparent 1.4px);
  background-size: 30px 30px;
  background-position: 12px 12px;
}

/* ===== Left rail ===== */
.rail {
  position: fixed; left: 14px; top: 50%; transform: translateY(-50%);
  z-index: 20; border-radius: 16px; overflow: hidden; background: #1c1c1e;
  box-shadow: 0 6px 24px rgba(0,0,0,.18); padding: 13px 10px;
}
.rail-img { display: block; width: auto; height: min(432px, calc(60vh - 56px)); }
.rail-logo { padding: 6px 0 10px; }
.rail-btn {
  width: 40px; height: 40px; border: none; background: transparent;
  color: #cfcfd2; font-size: 18px; border-radius: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.rail-btn:hover { background: #2e2e31; color: #fff; }
.rail-active { background: #000; color: #fff; }

/* ===== Topbar left ===== */
.topbar-left {
  position: fixed; left: 14px; top: 14px; z-index: 15; height: 54px;
  display: flex; align-items: center; padding: 0 11px;
  border-radius: 11px; overflow: hidden; background: #fff;
  box-shadow: 0 4px 16px rgba(0,0,0,.08);
}
.topleft-img { display: block; width: auto; height: 44px; }
.mural-title { font-weight: 600; font-size: 15px; }
.chev { color: var(--muted); font-size: 13px; }
.divider { width: 1px; height: 22px; background: var(--line); display: inline-block; }
.tb-icon { color: var(--ink); font-size: 16px; cursor: pointer; }
.tb-icon.dim { color: var(--muted-2); }

/* ===== Topbar right ===== */
.topbar-right {
  position: fixed; right: 22px; top: 14px; z-index: 30; height: 54px;
  display: flex; align-items: center; gap: 12px;
  background: #fff; border-radius: 14px; padding: 5px 9px;
  box-shadow: 0 4px 16px rgba(0,0,0,.08);
}
.topright-img { display: block; height: 44px; width: auto; margin-left: -2px; }
.topright-participant { display: none; }
body.view-participant .topright-facilitator { display: none; }
body.view-participant .topright-participant { display: block; }
.timer-pill {
  display: flex; align-items: center; gap: 12px;
  background: var(--red); color: #fff; border: none;
  border-radius: 11px; padding: 9px 20px 9px 14px; cursor: pointer;
  font-family: var(--font); transition: background .15s;
  min-width: 128px;
}
.timer-pill:hover { background: var(--red-bright); }
.pill-icon { display: flex; align-items: center; }
.pill-music { display: none; align-items: center; gap: 7px; }
/* show the music note + visualizer only when running WITH a track */
.timer-pill.running.music .ic-stopwatch { display: none; }
.timer-pill.running.music .pill-music { display: flex; }
.timer-pill.done { background: #1c1c1e; }
.timer-pill.done .pill-time { font-size: 16px; }
.pill-time {
  font-size: 20px; font-weight: 700; letter-spacing: .5px;
  font-variant-numeric: tabular-nums;
}
/* visualizer bars */
.viz { display: inline-flex; align-items: flex-end; gap: 2px; height: 16px; }
.viz i {
  width: 3px; height: 5px; background: #fff; border-radius: 2px;
  transform-origin: bottom; transition: height .08s linear;
}

.tb-pill {
  display: flex; align-items: center; gap: 7px; border: none; background: #fff;
  font-family: var(--font); font-weight: 600; font-size: 14px; color: var(--ink);
  cursor: pointer; padding: 6px 8px; border-radius: 9px;
}
.tb-pill:hover { background: #f1f1f2; }
.facil-ico { font-size: 15px; }
.tb-round {
  width: 38px; height: 38px; border-radius: 9px; border: none; background: #1c1c1e;
  color: #fff; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.tb-round.help { background: #1c1c1e; }
.tb-round:hover { background: #000; }
.avatar {
  width: 38px; height: 38px; border-radius: 9px;
  background: linear-gradient(135deg,#f6a, #b14de0);
  background-size: cover;
}

/* ===== Panels ===== */
.panel {
  position: fixed; right: 22px; top: 78px; z-index: 25;
  width: 392px; background: #fff; border-radius: var(--radius);
  box-shadow: var(--panel-shadow); padding: 24px;
  transform: scale(0.8); transform-origin: top right;
  animation: panelIn .16s ease;
}
@keyframes panelIn { from { opacity: 0; transform: translateY(-6px) scale(0.8);} to {opacity:1; transform: scale(0.8);} }
.panel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.panel-head h2 { font-size: 22px; font-weight: 700; margin: 0; }
.panel-close {
  border: none; background: transparent; font-size: 18px; cursor: pointer; color: var(--ink);
  width: 30px; height: 30px; border-radius: 8px;
}
.panel-close:hover { background: #f1f1f2; }
.panel-note { color: var(--muted); font-size: 15px; line-height: 1.45; margin: 0 0 20px; }

.field-label { font-size: 17px; font-weight: 700; margin: 0 0 12px; }
.field-label.big { margin-top: 22px; }

/* Segmented control */
.seg { display: flex; gap: 10px; margin-bottom: 20px; }
.seg-btn {
  flex: 1; border: none; background: var(--seg-bg); color: var(--ink);
  font-family: var(--font); font-weight: 600; font-size: 14px;
  padding: 12px 6px; border-radius: 11px; cursor: pointer; transition: .12s;
}
.seg-btn:hover { background: #e4e6e9; }
.seg-btn.is-active { background: var(--ink); color: #fff; }

/* Stepper */
.stepper {
  display: flex; align-items: center; gap: 16px; margin-bottom: 22px;
}
.step-btn {
  width: 32px; height: 32px; border: none; background: transparent; cursor: pointer;
  font-size: 26px; line-height: 1; color: var(--ink); display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
}
.step-btn:hover { background: #f1f1f2; }

/* Tooltips (dark bubble + upward caret, shown on hover) */
[data-tip] { position: relative; }
[data-tip]::after {
  content: attr(data-tip);
  position: absolute; top: calc(100% + 11px); left: 50%;
  transform: translateX(-50%) translateY(3px);
  background: #1c1c1e; color: #fff; font-size: 14px; font-weight: 600;
  padding: 8px 14px; border-radius: 10px; white-space: nowrap;
  opacity: 0; pointer-events: none; transition: opacity .12s ease, transform .12s ease; z-index: 60;
}
[data-tip]::before {
  content: ""; position: absolute; top: calc(100% + 5px); left: 50%;
  transform: translateX(-50%) translateY(3px);
  border: 6px solid transparent; border-bottom-color: #1c1c1e;
  opacity: 0; pointer-events: none; transition: opacity .12s ease, transform .12s ease; z-index: 60;
}
[data-tip]:hover::after, [data-tip]:hover::before { opacity: 1; transform: translateX(-50%) translateY(0); }
.step-field {
  flex: 1; text-align: center; border: 2px solid var(--line); border-radius: 12px;
  padding: 8px 14px; font-size: 28px; font-weight: 700; color: var(--ink-soft);
  font-variant-numeric: tabular-nums;
}
.stepper.big { gap: 20px; margin: 6px 0 22px; }
.step-time { flex: 1; text-align: center; font-size: 44px; font-weight: 800; font-variant-numeric: tabular-nums; }
.stepper.big .step-btn { font-size: 34px; width: 40px; height: 40px; }

/* Music row */
.music-row { position: relative; display: flex; align-items: center; gap: 14px; margin-bottom: 26px; }
.select {
  flex: 1; display: flex; align-items: center; gap: 12px; cursor: pointer;
  border: 2px solid var(--line); border-radius: 12px; padding: 8px 14px;
  outline: none;
}
.select:focus, .select.open { border-color: #9a9aa0; }
.select-icon { display: flex; }
.select-label { flex: 1; font-size: 18px; font-weight: 600; }
.select-chev { color: var(--muted); font-size: 15px; }
.track-dot {
  width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 18px; flex-shrink: 0;
}
.dot-none { background: #5a5a5e; }
.track-dot svg { width: 22px; height: 22px; display: block; }
.ic-stopwatch { width: 20px; height: 20px; }
.pill-note { width: 18px; height: 18px; color: #fff; }

.preview-btn {
  width: 44px; height: 44px; border: none; background: transparent; cursor: pointer;
  color: var(--muted-2); display: flex; align-items: center; justify-content: center; border-radius: 10px;
}
.preview-btn:not(:disabled) { color: var(--ink); }
.preview-btn:not(:disabled):hover { background: #f1f1f2; }
.preview-btn.playing { color: var(--red); }
.preview-btn:disabled .wave { display: none; }

/* Dropdown */
.dropdown {
  position: absolute; top: 48px; left: 0; width: calc(100% - 58px);
  background: #fff; border-radius: 14px; box-shadow: var(--panel-shadow);
  list-style: none; margin: 0; padding: 8px; max-height: 360px; overflow-y: auto; z-index: 5;
}
.dd-item { display: flex; align-items: center; gap: 14px; padding: 10px; border-radius: 10px; cursor: pointer; }
.dd-item:hover { background: #f4f4f5; }
.dd-text { display: flex; flex-direction: column; }
.dd-name { font-size: 18px; font-weight: 600; line-height: 1.2; }
.dd-genre { font-size: 14px; color: var(--muted); }
.dd-check { margin-left: auto; color: var(--red); font-weight: 700; display: none; }
.dd-item.selected .dd-check { display: block; }

/* Buttons */
.btn-primary {
  width: 100%; border: none; background: var(--red); color: #fff;
  font-family: var(--font); font-weight: 700; font-size: 18px;
  padding: 16px; border-radius: 12px; cursor: pointer; transition: background .15s;
}
.btn-primary:hover { background: var(--red-bright); }
.btn-primary.danger { width: auto; flex: 1; }
.btn-secondary {
  flex: 1; border: 2px solid var(--line); background: #fff; color: var(--ink-soft);
  font-family: var(--font); font-weight: 700; font-size: 18px; padding: 14px;
  border-radius: 12px; cursor: pointer;
}
.btn-secondary:hover { background: #f7f7f8; }

/* Volume row */
.vol-row { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
.vol-mute, .vol-step {
  border: none; background: transparent; cursor: pointer; color: var(--ink);
  display: flex; align-items: center; justify-content: center; border-radius: 8px;
}
.vol-mute { width: 36px; height: 36px; }
.vol-mute .mute-x { display: none; }
.vol-mute.muted .mute-x { display: block; }
.vol-mute.muted .mute-wave { display: none; }
.vol-mute.muted { color: var(--muted); }
.vol-step { width: 30px; height: 30px; font-size: 24px; }
.vol-step:hover, .vol-mute:hover { background: #f1f1f2; }
.vol-slider { flex: 1; accent-color: #2f6df0; height: 6px; }

.run-actions { display: flex; gap: 14px; margin-top: 4px; }
.facil-only.hidden { display: none; }

/* ===== Bottom bar ===== */
.bottom-bar {
  position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 15;
  height: 54px; display: flex; align-items: center; padding: 0 11px;
  background: #fff; border-radius: 14px; overflow: hidden;
  box-shadow: 0 4px 16px rgba(0,0,0,.08);
}
.bottom-center-img { display: block; height: 44px; width: auto; }
.bb-emoji { font-size: 20px; }
.bb-div { width: 1px; height: 24px; background: var(--line); }
.bb-av { width: 34px; height: 34px; border-radius: 9px; }
.bb-av.a1 { background: linear-gradient(135deg,#f9c,#c49); }
.bb-av.a2 { background: linear-gradient(135deg,#9d8,#5a4); }
.bb-av.a3 { background: linear-gradient(135deg,#fc9,#d85); }
.bb-av.a4 { background: linear-gradient(135deg,#9cf,#46a); }
.bb-av.a5 { background: linear-gradient(135deg,#c9f,#84d); }
.bb-more { color: var(--muted); font-size: 18px; padding: 0 4px; }

/* ===== Zoom ===== */
.zoom-bar {
  position: fixed; bottom: 22px; right: 22px; z-index: 15;
  height: 54px; display: flex; align-items: center; padding: 0 11px;
  background: #fff; border-radius: 14px; overflow: hidden;
  box-shadow: 0 4px 16px rgba(0,0,0,.08);
}
.bottom-right-img { display: block; height: 44px; width: auto; }
.zoom-bar span { font-size: 15px; }
.z-div { width: 1px; height: 20px; background: var(--line); }
.z-pct { font-weight: 600; font-variant-numeric: tabular-nums; }
.z-minus, .z-plus { font-size: 18px; cursor: pointer; }

/* ===== Role toggle (dev) ===== */
.role-toggle {
  position: fixed; left: 90px; bottom: 22px; z-index: 40;
  display: flex; align-items: center; gap: 6px; background: #1c1c1e; color: #fff;
  border-radius: 12px; padding: 6px 8px 6px 14px; box-shadow: 0 4px 16px rgba(0,0,0,.2);
}
.role-label { font-size: 12px; color: #9a9a9e; text-transform: uppercase; letter-spacing: .5px; margin-right: 4px; }
.role-btn {
  border: none; background: transparent; color: #c9c9cc; font-family: var(--font);
  font-weight: 600; font-size: 13px; padding: 6px 12px; border-radius: 8px; cursor: pointer;
}
.role-btn.is-active { background: #fff; color: #1c1c1e; }

  </style>
</head>

  <!-- ===== Setup panel (idle) ===== -->
  <section id="setupPanel" class="panel" role="dialog" aria-label="Timer setup" hidden>
    <div class="panel-head">
      <h2>Timer</h2>
      <button class="panel-close" data-close>✕</button>
    </div>

    <h3 class="field-label">Duration</h3>
    <div class="seg" id="durationSeg">
      <button class="seg-btn" data-dur="2">2 mins</button>
      <button class="seg-btn is-active" data-dur="5">5 mins</button>
      <button class="seg-btn" data-dur="10">10 mins</button>
      <button class="seg-btn" data-dur="custom">Custom</button>
    </div>

    <div class="stepper" id="customStepper" hidden>
      <button class="step-btn" id="stepMinus" data-tip="Remove a minute">−</button>
      <div class="step-field" id="customDisplay">05:00</div>
      <button class="step-btn" id="stepPlus" data-tip="Add a minute">+</button>
    </div>

    <h3 class="field-label">Music</h3>
    <div class="music-row">
      <div class="select" id="musicSelect" tabindex="0" role="button" aria-haspopup="listbox">
        <span class="select-icon" id="selIcon"><span class="track-dot dot-none">♪</span></span>
        <span class="select-label" id="selLabel">No music</span>
        <span class="select-chev">⌄</span>
      </div>
      <button class="preview-btn" id="previewBtn" disabled aria-label="Preview music">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor"/><path class="wave" d="M16 8.5a5 5 0 010 7M18.5 6a8.5 8.5 0 010 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <!-- dropdown -->
      <ul class="dropdown" id="musicDropdown" role="listbox" hidden></ul>
    </div>

    <button class="btn-primary" id="startBtn">Start timer</button>
  </section>

  <!-- ===== Running control panel ===== -->
  <section id="runPanel" class="panel" role="dialog" aria-label="Timer controls" hidden>
    <div class="panel-head">
      <h2>Your volume</h2>
      <button class="panel-close" data-close>✕</button>
    </div>
    <p class="panel-note">Timer music plays for everyone currently in this mural. Each person can control their own volume.</p>

    <div class="vol-row">
      <button class="vol-mute" id="muteBtn" aria-label="Mute">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor"/><path class="mute-x" d="M16 9l5 6M21 9l-5 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/><path class="mute-wave" d="M16 8.5a5 5 0 010 7M18.5 6a8.5 8.5 0 010 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button class="vol-step" id="volMinus">−</button>
      <input type="range" id="volSlider" class="vol-slider" min="0" max="100" value="60" />
      <button class="vol-step" id="volPlus">+</button>
    </div>

    <!-- Facilitator-only -->
    <div class="facil-only" id="facilControls">
      <h3 class="field-label big">Adjust time</h3>
      <div class="stepper big" id="adjustStepper">
        <button class="step-btn" id="adjMinus">−</button>
        <div class="step-time" id="adjTime">4:58</div>
        <button class="step-btn" id="adjPlus">+</button>
      </div>
      <div class="run-actions">
        <button class="btn-secondary" id="pauseBtn">Pause</button>
        <button class="btn-primary danger" id="endBtn">End</button>
      </div>
    </div>
  </section>

  <script>
/* ============================================================
   Synthesized music engine (Web Audio API)
   No binary files needed — each "track" is generated procedurally
   with a distinct tempo / scale / waveform so they feel different.
   Drop real loops into assets/sounds/ later and swap playTrack().
   ============================================================ */

const TRACKS = {
  none:     { name: "No music",  genre: "The sound of silence", icon: "♪",  color: "#5a5a5e" },
  energize: { name: "Energize",  genre: "Funk pop",             icon: "⚡", color: "#e8821e",
              tempo: 124, wave: "sawtooth", root: 220, scale: [0, 3, 5, 7, 10], swing: 0 },
  focus:    { name: "Focus",     genre: "Minimal electronic",   icon: "🖼", color: "#7b5be0",
              tempo: 104, wave: "sine",     root: 174, scale: [0, 2, 5, 7, 9],  swing: 0 },
  imagine:  { name: "Imagine",   genre: "Lo-fi beats",          icon: "💡", color: "#b3a035",
              tempo: 82,  wave: "triangle", root: 196, scale: [0, 3, 5, 7, 10], swing: 0.18 },
  flow:     { name: "Flow",      genre: "Indie electronic",     icon: "〜", color: "#3b7de0",
              tempo: 112, wave: "triangle", root: 233, scale: [0, 2, 4, 7, 9],  swing: 0.05 },
  decide:   { name: "Decide",    genre: "Jazz grove",           icon: "✓",  color: "#e0635b",
              tempo: 96,  wave: "sine",     root: 207, scale: [0, 3, 5, 6, 10], swing: 0.22 },
  sprint:   { name: "Sprint",    genre: "Percussive house",     icon: "»",  color: "#b14de0",
              tempo: 128, wave: "square",   root: 261, scale: [0, 2, 3, 7, 10], swing: 0 },
};
const TRACK_ORDER = ["energize", "focus", "imagine", "flow", "decide", "sprint"];

class MusicEngine {
  constructor() {
    this.ctx = null;
    this.master = null;
    this.analyser = null;
    this.freqData = null;
    this.current = null;       // track key currently playing
    this.timerId = null;
    this.nextNoteTime = 0;
    this.step = 0;
    this.volume = 0.6;
    this.muted = false;
  }

  _ensure() {
    if (this.ctx) return;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    this.ctx = new Ctx();
    this.master = this.ctx.createGain();
    this.master.gain.value = this.volume;
    this.analyser = this.ctx.createAnalyser();
    this.analyser.fftSize = 64;
    this.freqData = new Uint8Array(this.analyser.frequencyBinCount);
    this.master.connect(this.analyser);
    this.analyser.connect(this.ctx.destination);
  }

  setVolume(v) {                         // v: 0..1
    this.volume = v;
    if (this.master) {
      const g = this.muted ? 0 : v;
      this.master.gain.setTargetAtTime(g, this.ctx.currentTime, 0.05);
    }
  }
  setMuted(m) {
    this.muted = m;
    if (this.master) this.master.gain.setTargetAtTime(m ? 0 : this.volume, this.ctx.currentTime, 0.05);
  }

  play(trackKey) {
    if (!trackKey || trackKey === "none" || !TRACKS[trackKey].tempo) { this.stop(); return; }
    this._ensure();
    if (this.ctx.state === "suspended") this.ctx.resume();
    if (this.current === trackKey && this.timerId) return;
    this.stop();
    this.current = trackKey;
    this.step = 0;
    this.nextNoteTime = this.ctx.currentTime + 0.06;
    this._scheduler();
  }

  stop() {
    if (this.timerId) { clearInterval(this.timerId); this.timerId = null; }
    this.current = null;
  }

  isPlaying() { return !!this.timerId; }

  // amplitude 0..1 for visualizer
  level() {
    if (!this.analyser || !this.timerId) return 0;
    this.analyser.getByteFrequencyData(this.freqData);
    let sum = 0;
    for (let i = 0; i < this.freqData.length; i++) sum += this.freqData[i];
    return (sum / this.freqData.length) / 255;
  }

  _scheduler() {
    const lookahead = 0.1;
    const tick = () => {
      const t = TRACKS[this.current];
      const secPerStep = 60 / t.tempo / 2;          // 8th notes
      while (this.nextNoteTime < this.ctx.currentTime + lookahead) {
        this._scheduleStep(t, this.step, this.nextNoteTime);
        const swung = (this.step % 2 === 1) ? t.swing * secPerStep : 0;
        this.nextNoteTime += secPerStep + swung;
        this.step = (this.step + 1) % 16;
      }
    };
    this.timerId = setInterval(tick, 25);
  }

  _noteFreq(t, scaleIdx, octave = 0) {
    const semis = t.scale[((scaleIdx % t.scale.length) + t.scale.length) % t.scale.length];
    return t.root * Math.pow(2, (semis + 12 * octave) / 12);
  }

  _scheduleStep(t, step, time) {
    // Bass on the beat
    if (step % 4 === 0) {
      this._voice(this._noteFreq(t, step / 4, -1), time, 0.28, t.wave, 0.22);
    }
    // Melody — pseudo-random but deterministic per step
    const melodyOn = [0, 3, 6, 8, 10, 14].includes(step);
    if (melodyOn) {
      const idx = (step * 3) % 7;
      this._voice(this._noteFreq(t, idx, 1), time, 0.18, t.wave, 0.12);
    }
    // Hi-hat-ish noise on off-beats
    if (step % 2 === 1) this._hat(time, 0.04);
    // Kick feel on house/funk
    if ((t.tempo >= 120) && step % 4 === 0) this._kick(time);
  }

  _voice(freq, time, dur, wave, gain) {
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = wave; o.frequency.value = freq;
    g.gain.setValueAtTime(0, time);
    g.gain.linearRampToValueAtTime(gain, time + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0008, time + dur);
    o.connect(g); g.connect(this.master);
    o.start(time); o.stop(time + dur + 0.02);
  }

  _hat(time, dur) {
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * dur, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const s = this.ctx.createBufferSource(); s.buffer = buf;
    const hp = this.ctx.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 7000;
    const g = this.ctx.createGain(); g.gain.value = 0.06;
    s.connect(hp); hp.connect(g); g.connect(this.master);
    s.start(time);
  }

  _kick(time) {
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.frequency.setValueAtTime(140, time);
    o.frequency.exponentialRampToValueAtTime(45, time + 0.12);
    g.gain.setValueAtTime(0.5, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.16);
    o.connect(g); g.connect(this.master);
    o.start(time); o.stop(time + 0.18);
  }

  // End-of-timer chime (independent of master volume so it's always audible-ish)
  chime() {
    this._ensure();
    if (this.ctx.state === "suspended") this.ctx.resume();
    const now = this.ctx.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.5]; // C E G C
    notes.forEach((f, i) => {
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      const start = now + i * 0.14;
      o.type = "sine"; o.frequency.value = f;
      g.gain.setValueAtTime(0, start);
      g.gain.linearRampToValueAtTime(0.35, start + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0008, start + 0.6);
      o.connect(g); g.connect(this.ctx.destination); // bypass master/mute
      o.start(start); o.stop(start + 0.65);
    });
  }
}

function trackDot(key, sizeClass = "") {
  const t = TRACKS[key];
  const none = key === "none" ? "dot-none" : "";
  const style = key === "none" ? "" : `style="background:${t.color}"`;
  return `<span class="track-dot ${none} ${sizeClass}" ${style}>${ICONS[key] || ""}</span>`;
}

// ============================================================
//  Setup panel — duration
// ============================================================
durationSeg.addEventListener("click", (e) => {
  const btn = e.target.closest(".seg-btn");
  if (!btn) return;
  [...durationSeg.children].forEach((b) => b.classList.toggle("is-active", b === btn));
  const v = btn.dataset.dur;
  if (v === "custom") {
    state.isCustom = true;
    customStepper.hidden = false;
    state.durationSec = state.customSec;
    customDisplay.textContent = fmt(state.customSec);
  } else {
    state.isCustom = false;
    customStepper.hidden = true;
    state.durationSec = parseInt(v, 10) * 60;
  }
  refreshPillIdle();
});

$("#stepMinus").addEventListener("click", () => stepCustom(-60));
$("#stepPlus").addEventListener("click", () => stepCustom(60));
function stepCustom(delta) {
  state.customSec = clamp(state.customSec + delta, 60, 60 * 60);
  state.durationSec = state.customSec;
  customDisplay.textContent = fmt(state.customSec);
  refreshPillIdle();
}

// ============================================================
//  Music select + dropdown
// ============================================================
function renderDropdown() {
  const keys = ["none", ...TRACK_ORDER];
  // Swap behavior (per designs): omit the currently-selected option — when a
  // track is active "No music" reappears; when "No music" is active it drops out.
  // Traditional: show every option and check the active one.
  const list = TRADITIONAL_DROPDOWN ? keys : keys.filter((k) => k !== state.track);
  dropdown.innerHTML = list.map((k) => {
    const t = TRACKS[k];
    const sel = k === state.track ? "selected" : "";
    return `<li class="dd-item ${sel}" data-key="${k}" role="option">
      ${trackDot(k)}
      <span class="dd-text"><span class="dd-name">${t.name}</span><span class="dd-genre">${t.genre}</span></span>
      <span class="dd-check">✓</span>
    </li>`;
  }).join("");
}
function openDropdown() {
  renderDropdown();
  dropdown.hidden = false;
  musicSelect.classList.add("open");
}
function closeDropdown() {
  dropdown.hidden = true;
  musicSelect.classList.remove("open");
}
musicSelect.addEventListener("click", () => {
  dropdown.hidden ? openDropdown() : closeDropdown();
});
dropdown.addEventListener("click", (e) => {
  const item = e.target.closest(".dd-item");
  if (!item) return;
  selectTrack(item.dataset.key);
  closeDropdown();
});
document.addEventListener("click", (e) => {
  if (!e.target.closest(".music-row")) closeDropdown();
});

function selectTrack(key) {
  state.track = key;
  selIcon.innerHTML = trackDot(key);
  selLabel.textContent = TRACKS[key].name;
  const isNone = key === "none";
  previewBtn.disabled = isNone;
  if (isNone) stopPreview();
  // if previewing, switch the preview to the new track
  if (state.previewing && !isNone) MUSIC.play(key);
}

// Preview toggle (play ▶ / stop ■)
previewBtn.addEventListener("click", () => {
  if (state.track === "none") return;
  state.previewing ? stopPreview() : startPreview();
});
function startPreview() {
  state.previewing = true;
  previewBtn.classList.add("playing");
  MUSIC.setVolume(state.muted ? 0 : volSlider.value / 100);
  MUSIC.play(state.track);
}
function stopPreview() {
  state.previewing = false;
  previewBtn.classList.remove("playing");
  if (!state.running) MUSIC.stop();
}

// ============================================================
//  Pill / panel open-close
// ============================================================
pill.addEventListener("click", () => {
  if (state.running) toggleRunPanel();
  else toggleSetupPanel();
});
document.querySelectorAll("[data-close]").forEach((b) =>
  b.addEventListener("click", () => { setupPanel.hidden = true; runPanel.hidden = true; state.panelOpen = false; })
);
function toggleSetupPanel() {
  const open = setupPanel.hidden;
  setupPanel.hidden = !open;
  runPanel.hidden = true;
}
function toggleRunPanel() {
  const open = runPanel.hidden;
  runPanel.hidden = !open;
  setupPanel.hidden = true;
}

// ============================================================
//  Start / countdown / pause / end
// ============================================================
let ticker = null;
let endAt = 0;

startBtn.addEventListener("click", startTimer);
function startTimer() {
  state.running = true;
  state.paused = false;
  state.remaining = state.durationSec;
  stopPreview();
  setupPanel.hidden = true;
  pill.classList.add("running");
  pill.classList.toggle("music", state.track !== "none");
  if (state.track !== "none") {
    MUSIC.setVolume(state.muted ? 0 : volSlider.value / 100);
    MUSIC.play(state.track);
  }
  runTick();
  endAt = performance.now() + state.remaining * 1000;
  ticker = setInterval(tickLoop, 200);
  startViz();
}

function tickLoop() {
  if (state.paused) return;
  state.remaining = (endAt - performance.now()) / 1000;
  if (state.remaining <= 0) { state.remaining = 0; finishTimer(); }
  runTick();
}

function runTick() {
  const txt = fmt(state.remaining, true);
  pillTime.textContent = txt;
  adjTime.textContent = fmt(state.remaining, false);
}

pauseBtn.addEventListener("click", () => {
  state.paused = !state.paused;
  pauseBtn.textContent = state.paused ? "Resume" : "Pause";
  if (state.paused) {
    MUSIC.stop();
  } else {
    endAt = performance.now() + state.remaining * 1000;
    if (state.track !== "none") MUSIC.play(state.track);
  }
});

endBtn.addEventListener("click", () => resetToIdle());

function finishTimer() {
  clearInterval(ticker); ticker = null;
  MUSIC.stop();
  MUSIC.chime();
  pillTime.textContent = "Time's up!";
  pill.classList.add("done");
  setTimeout(() => { resetToIdle(); }, 3200);
}

function resetToIdle() {
  clearInterval(ticker); ticker = null;
  stopViz();
  MUSIC.stop();
  state.running = false;
  state.paused = false;
  pauseBtn.textContent = "Pause";
  pill.classList.remove("running", "done", "music");
  runPanel.hidden = true;
  state.remaining = state.durationSec;
  refreshPillIdle();
}

function refreshPillIdle() {
  if (!state.running) pillTime.textContent = fmt(state.durationSec, true);
}

// Adjust time (facilitator)
$("#adjMinus").addEventListener("click", () => adjustRemaining(-30));
$("#adjPlus").addEventListener("click", () => adjustRemaining(30));
function adjustRemaining(delta) {
  if (!state.running) return;
  state.remaining = clamp(state.remaining + delta, 0, 99 * 60);
  endAt = performance.now() + state.remaining * 1000;
  runTick();
}

// ============================================================
//  Volume + mute (per-user)
// ============================================================
volSlider.addEventListener("input", () => {
  if (state.muted) toggleMute();
  MUSIC.setVolume(volSlider.value / 100);
});
$("#volMinus").addEventListener("click", () => nudgeVol(-10));
$("#volPlus").addEventListener("click", () => nudgeVol(10));
function nudgeVol(d) {
  volSlider.value = clamp(parseInt(volSlider.value, 10) + d, 0, 100);
  if (state.muted && volSlider.value > 0) toggleMute();
  MUSIC.setVolume(volSlider.value / 100);
}
muteBtn.addEventListener("click", toggleMute);
function toggleMute() {
  state.muted = !state.muted;
  muteBtn.classList.toggle("muted", state.muted);
  MUSIC.setMuted(state.muted);
}

// ============================================================
//  Visualizer (pill bars driven by real audio level)
// ============================================================
let vizRAF = null;
const bars = [...viz.querySelectorAll("i")];
function startViz() {
  const seeds = [0.6, 1, 0.75, 1, 0.55];
  const animate = () => {
    const lvl = MUSIC.level();           // 0..1
    bars.forEach((b, i) => {
      const base = state.track === "none" ? 0.12 : 0.25;
      const wobble = state.track === "none" ? 0 : (Math.sin(performance.now() / (120 + i * 40)) + 1) / 2;
      const h = 3 + (base + lvl * seeds[i] + wobble * 0.4) * 13;
      b.style.height = clamp(h, 3, 16) + "px";
    });
    vizRAF = requestAnimationFrame(animate);
  };
  animate();
}
function stopViz() {
  if (vizRAF) cancelAnimationFrame(vizRAF);
  vizRAF = null;
  bars.forEach((b) => (b.style.height = "5px"));
}

// ============================================================
//  Role toggle (dev)
// ============================================================
document.querySelector(".role-toggle").addEventListener("click", (e) => {
  const btn = e.target.closest(".role-btn");
  if (!btn) return;
  state.role = btn.dataset.role;
  document.querySelectorAll(".role-btn").forEach((b) => b.classList.toggle("is-active", b === btn));
  facilControls.classList.toggle("hidden", state.role !== "facilitator");
  document.body.classList.toggle("view-participant", state.role === "participant");
});

// ---- init
selectTrack("none");
refreshPillIdle();
setupPanel.hidden = false;   // open on load so the panel is visible
state.panelOpen = true;

  </script>
</body>
